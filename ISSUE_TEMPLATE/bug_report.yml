name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Datacore version
      description: "Output of: git log --oneline -1"
    validations:
      required: false
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Core framework
        - Agent/Command
        - Module (specify in description)
        - MCP server
        - GTD workflow
        - Other
    validations:
      required: true
